# ===================================================================
# CONFIGURAГ‡ГѓO HГЌBRIDA (LOCAL vs PRODUГ‡ГѓO)
# ===================================================================

# 1. URL DE CONEXГѓO
# LГіgica: Tenta pegar a URL da nuvem (${DB_URL}). 
# Se nГЈo achar (estГЎ local), usa o endereГ§o do Docker (:jdbc:postgresql://...)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/karaq}

# 2. USUГЃRIO
# LГіgica: Tenta pegar ${DB_USERNAME} da nuvem, senГЈo usa 'postgres'
spring.datasource.username=${DB_USERNAME:postgres}

# 3. SENHA
# LГіgica: Tenta pegar ${DB_PASSWORD} da nuvem, senГЈo usa 'password123'
spring.datasource.password=${DB_PASSWORD:password123}

# ===================================================================
# JPA & HIBERNATE
# ===================================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# Em produГ§ГЈo, mude para false para nГЈo poluir os logs do Render
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false

# --- ConfiguraГ§ГЈo do JWT (JSON Web Token) ---

# Chave secreta: Tenta ler da env JWT_SECRET, senГЈo usa o valor padrГЈo de dev
jwt.secret-key=${JWT_SECRET:bWluaGFjaGF2ZXN1cGVyc2VjcmV0YWVjdW1wcmlkYTEyMzQ1Njc4OTA=}
# Tempo de expiraГ§ГЈo do token em milissegundos (7200000 ms = 2 horas)
jwt.expiration=${JWT_EXPIRATION:7200000}

# ---- API KEY DO YOUTUBE ---- # 

